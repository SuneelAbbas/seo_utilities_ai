runtime:
  image: node:22

# ─── Playwright Configuration ──────────────────────────────────────────
# Setting PLAYWRIGHT_BROWSERS_PATH=0 installs browsers inside node_modules/
# (project-local), which avoids permission issues on StackHost where the
# non-root user cannot write to ~/.cache/ms-playwright.
env:
  - name: PLAYWRIGHT_BROWSERS_PATH
    value: "0"

  # ─── AI Module — OpenRouter (Required) ─────────────────────────────
  # IMPORTANT: Set the actual API key value via StackHost Dashboard
  # (Settings → Environment Variables) — do NOT hardcode secrets here.
  # Get your key at: https://openrouter.ai/keys
  - name: OPENROUTER_API_KEY
    value: ""

  # ─── AI Module — Base Configuration ────────────────────────────────
  - name: OPENROUTER_BASE_URL
    value: "https://openrouter.ai/api/v1"
  - name: OPENROUTER_ENABLED
    value: "true"
  - name: DEFAULT_MODEL
    value: "deepseek/deepseek-chat-v3-0324"
  - name: AI_MODULE_ENABLED
    value: "true"

  # ─── AI Module — Timeout & Retry ───────────────────────────────────
  - name: AI_TIMEOUT_MS
    value: "60000"
  - name: AI_MAX_RETRIES
    value: "3"

  # ─── AI Module — Rate Limiting ─────────────────────────────────────
  - name: AI_RATE_LIMIT_MAX
    value: "60"
  - name: AI_RATE_LIMIT_WINDOW_MS
    value: "60000"

  # ─── AI Module — Logging & Cost Tracking ───────────────────────────
  - name: AI_LOGGING_ENABLED
    value: "true"
  - name: AI_LOG_LEVEL
    value: "info"
  - name: AI_COST_TRACKING_ENABLED
    value: "true"

commands:
  package: ""
  build:
    - "npm install"
    - "npm run install:muffet"
    # Install Chromium for Playwright-based DeepCrawlEngine (used by
    # /api/orchestrator/crawl attempts 2 & 3).
    # IMPORTANT: Do NOT add --with-deps flag — it runs apt-get internally
    # which is disallowed in StackHost's sandboxed build environment.
    - "npx playwright install chromium"
    # Build TypeScript — compiles src/ (including src/modules/ai/) into dist/
    - "npm run build"
  start: "npm run start"

repository:
  branch: main
  auto_deploy: true
